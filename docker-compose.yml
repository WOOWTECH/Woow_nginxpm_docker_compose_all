version: '3.8'
name: nginx-proxy-manager

services:
  db:
    image: postgres:17
    container_name: npm-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-npm}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-npm}
    volumes:
      - npm-db-data:/var/lib/postgresql/data
    networks:
      - npm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-npm} -d ${POSTGRES_DB:-npm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-81}:81"
    environment:
      - TZ=${TZ:-Asia/Taipei}
      - DB_POSTGRES_HOST=db
      - DB_POSTGRES_PORT=5432
      - DB_POSTGRES_USER=${POSTGRES_USER:-npm}
      - DB_POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DB_POSTGRES_NAME=${POSTGRES_DB:-npm}
    volumes:
      - npm-app-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    networks:
      - npm-network
    restart: unless-stopped

volumes:
  npm-db-data:
    name: npm-db-data
  npm-app-data:
    name: npm-app-data
  npm-letsencrypt:
    name: npm-letsencrypt

networks:
  npm-network:
    name: npm-network
    driver: bridge
